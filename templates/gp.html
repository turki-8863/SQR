<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SQR Skill Quest Road dashboard.">
  <title>SQR | Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>

<body class="page-body home-body colorful-page" data-page="home">

  <main class="page-shell home-shell dashboard-only-page">

    <div id="message" class="message-holder"></div>

    <section class="dashboard-header">
      <span class="eyebrow">Skill Quest Road</span>
      <h1>SQR Dashboard</h1>
      <p>Live website statistics loaded from the database.</p>
    </section>

    <section class="home-metrics dashboard-stats-grid" aria-label="Website statistics">

      <article class="metric-card cyan-card">
        <span>Specializations</span>
        <strong id="homeSpecCount">0</strong>
        <p>Total specializations added by admin.</p>
      </article>

      <article class="metric-card purple-card">
        <span>Courses</span>
        <strong id="homeCourseCount">0</strong>
        <p>Total courses available in the platform.</p>
      </article>

      <article class="metric-card orange-card">
        <span>Jobs</span>
        <strong id="homeJobCount">0</strong>
        <p>Total jobs connected to specializations.</p>
      </article>

    </section>

  </main>

</body>
</html>
