<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Courses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles-additions.css') }}">
</head>
<body>
<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>navbar();</script>
<div class="container">
  <div id="message"></div>
  <div class="page-header">
    <h1>Courses</h1>
    <p class="subtitle">Courses appear as cards. Open a course to see its description, actual course link, video, and quizzes.</p>
  </div>
  <div class="filter-row">
    <select id="courseSpecFilter" onchange="loadCourses()"></select>
    <select id="courseLevelFilter" onchange="loadCourses()">
      <option value="">All Levels</option>
      <option value="beginner">Beginner</option>
      <option value="intermediate">Intermediate</option>
      <option value="advanced">Advanced</option>
    </select>
  </div>
  <div id="coursesBox" class="grid"></div>
</div>
</body>
</html>
