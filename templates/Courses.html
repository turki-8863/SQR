<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Courses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='sqr-fixes.css') }}">
</head>
<body>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  navbar();
  requireLogin();
</script>

<div class="container">
  <div id="message"></div>

  <section class="hero">
    <h1>Courses</h1>
    <p class="subtitle">
      Open a course to start it automatically. Progress is tracked through opening course content and completing quizzes.
    </p>
  </section>

  <div class="filters card">
    <label for="courseSpecFilter">Filter by Specialization</label>
    <select id="courseSpecFilter" onchange="loadCourses()"></select>

    <label for="courseLevelFilter">Filter by Level</label>
    <select id="courseLevelFilter" onchange="loadCourses()">
      <option value="">All Levels</option>
      <option value="Beginner">Beginner</option>
      <option value="Intermediate">Intermediate</option>
      <option value="Advanced">Advanced</option>
    </select>
  </div>

  <div id="coursesBox" class="grid"></div>
</div>

</body>
</html>
