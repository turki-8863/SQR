<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Jobs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles-additions.css') }}">
</head>
<body>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>navbar();</script>

<div class="container">
  <div id="message"></div>

  <section class="hero small-hero">
    <h1>Job Recommendation</h1>
  </section>

  <form id="jobRecForm" class="card">
    <h2>Find Your Best Job Matches</h2>

    <label class="required" for="jobSkills">Skills</label>
    <textarea id="jobSkills" required placeholder="Python, SQL, Linux, React..."></textarea>

    <label class="required" for="jobInterests">Interests</label>
    <textarea id="jobInterests" required placeholder="Cybersecurity, AI, Data Engineering..."></textarea>

    <label class="required" for="jobGoal">Career Goal</label>
    <textarea id="jobGoal" required placeholder="I want to become a SOC analyst..."></textarea>

    <button type="submit">Get Top 3 Jobs</button>
  </form>

  <div id="topJobsBox"></div>

  <div class="card">
    <h2>Other Jobs</h2>
    <select id="jobSpecFilter">
      <option value="">All Specializations</option>
    </select>
  </div>

  <div id="jobsBox" class="grid"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  if (typeof loadSpecializations === "function") loadSpecializations();
  loadAllJobs();

  const filter = document.getElementById("jobSpecFilter");
  if (filter) filter.addEventListener("change", loadAllJobs);
});

document.getElementById("jobRecForm").addEventListener("submit", async e => {
  e.preventDefault();

  const profileText = [
    document.getElementById("jobSkills").value,
    document.getElementById("jobInterests").value,
    document.getElementById("jobGoal").value
  ].join(" ");

  try {
    const jobs = await api("/api/jobs?profile_text=" + encodeURIComponent(profileText));
    const sorted = jobs.sort((a, b) => (b.match_percentage || 0) - (a.match_percentage || 0));
    const top3 = sorted.slice(0, 3);
    const others = sorted.slice(3);

    document.getElementById("topJobsBox").innerHTML = `
      <div class="card">
        <h2>Top 3 Recommended Jobs</h2>
        <div class="grid">
          ${top3.map(jobCard).join("") || "<p>No recommended jobs found.</p>"}
        </div>
      </div>
    `;

    document.getElementById("jobsBox").innerHTML =
      others.map(jobCard).join("") || "<p>No other jobs found.</p>";
  } catch (err) {
    showMessage(err.message);
  }
});

async function loadAllJobs() {
  try {
    const spec = document.getElementById("jobSpecFilter")?.value || "";
    const url = spec ? `/api/jobs?specialization=${encodeURIComponent(spec)}` : "/api/jobs";
    const jobs = await api(url);

    document.getElementById("jobsBox").innerHTML =
      jobs.map(jobCard).join("") || "<p>No jobs found.</p>";
  } catch (err) {
    showMessage(err.message);
  }
}

function jobCard(j) {
  return `
    <div class="card job-card">
      <h3>${j.title || "Job"}</h3>
      <p><b>Match:</b> ${j.match_percentage || 0}%</p>
      <p><b>Label:</b> ${j.match_label || ""}</p>
      <p>${j.description || ""}</p>
      <p><b>Skills:</b> ${j.skills || j.required_skills || ""}</p>
      <p><b>Specialization:</b> ${j.specialization || j.specialization_name || ""}</p>
      ${j.salary ? `<p><b>Salary:</b> ${j.salary}</p>` : ""}
      ${j.link ? `<a href="${j.link}" target="_blank" class="btn primary">Apply / Details</a>` : ""}
    </div>
  `;
}
</script>

</body>
</html>
