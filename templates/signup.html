<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<script>navbar();</script>
<div class="container">
  <div id="message"></div>
  <form id="signupForm">
  <input id="name" type="text" placeholder="Full Name" required>
  <input id="email" type="email" placeholder="Email" required>
  <input id="password" type="password" placeholder="Password" required>
  <button type="submit">Sign Up</button>
</form>

<div id="message"></div>
  </form>
</div>
<script>
signupForm.addEventListener("submit", async e => {
  e.preventDefault();
  const data = await apiPost("/api/signup", { name: name.value, email: email.value, password: password.value, role: role.value });
  if (data.error) return showMessage("message", data.error, "error");
  setAuth(data.token, data.user);
  window.location.href = data.user.role === "admin" && data.user.current_mode !== "student" ? "/admin" : "/profile";
});
</script>
</body>
</html>
