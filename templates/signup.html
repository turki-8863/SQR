<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SQR Skill Quest Road dynamic CS career guidance platform.">
  <title>SQR | Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body class="page-body auth-body">
  <main class="page-shell">
    <div id="message"></div>

    <section class="auth-shell">
      <form id="signupForm" class="auth-card color-form">
        <span class="eyebrow">Create account</span>
        <h1>Join SQR</h1>
        <p>Students sign up as students only. Admin access should be granted by an existing owner/admin from the database or admin controls.</p>
        <label class="required" for="signupName">Name</label>
        <input id="signupName" name="name" required placeholder="Your name">
        <label class="required" for="signupEmail">Email</label>
        <input id="signupEmail" name="email" type="email" required placeholder="email@example.com">
        <label class="required" for="signupPassword">Password</label>
        <input id="signupPassword" name="password" type="password" required placeholder="At least 8 chars, uppercase, lowercase, number, symbol">
        <button type="submit" class="btn btn-primary full-btn">Create Account</button>
        <p class="auth-link">Already have an account? <a href="signin.html">Sign in</a></p>
      </form>
    </section>

  </main>
</body>
</html>
