<!DOCTYPE html>
<html lang="en">
<head>
<title>SQR | Sign In</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<div id="message"></div>
<section class="sqr-page-title"><h1>Sign In</h1><p>Access your SQR dashboard.</p></section><main class="sqr-shell"><form id="signinForm" class="rec-card"><div class="rec-field"><label for="email">Email or username</label><input id="email" name="email" required></div><div class="rec-field"><label for="password">Password</label><input id="password" name="password" type="password" required></div><button class="btn btn-primary" type="submit">Sign In</button><p>New to SQR? <a href="signup.html">Create account</a></p></form></main>
</body>
</html>
