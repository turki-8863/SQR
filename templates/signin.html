<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<script>navbar();</script>
<div class="container">
  <div id="message"></div>
  <form id="signinForm">
    <h1>Sign In</h1>
    <label>Email</label>
    <input id="email" type="email" required>
    <label>Password</label>
    <input id="password" type="password" required>
    <button type="submit">Sign In</button>
  </form>
</div>
<script>
signinForm.addEventListener("submit", async e => {
  e.preventDefault();
  const data = await apiPost("/api/signin", { email: email.value, password: password.value });
  if (data.error) return showMessage("message", data.error, "error");
  setAuth(data.token, data.user);
  window.location.href = data.user.role === "admin" && data.user.current_mode !== "student" ? "/admin" : "/profile";
});
</script>
</body>
</html>
