<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SQR Skill Quest Road dynamic CS career guidance platform.">
  <title>SQR | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body class="page-body auth-body">
  <main class="page-shell">
    <div id="message"></div>

    <section class="auth-shell">
      <form id="signinForm" class="auth-card color-form">
        <span class="eyebrow">Welcome back</span>
        <h1>Sign in to SQR</h1>
        <p>Access your profile, dynamic progress, quizzes, ATS tools, and recommendations.</p>
        <label class="required" for="signinEmail">Email</label>
        <input id="signinEmail" name="email" type="email" required placeholder="email@example.com">
        <label class="required" for="signinPassword">Password</label>
        <input id="signinPassword" name="password" type="password" required placeholder="Password">
        <button type="submit" class="btn btn-primary full-btn">Sign In</button>
        <p class="auth-link">No account? <a href="signup.html">Create one</a></p>
      </form>
    </section>

  </main>
</body>
</html>
