<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Recommendation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles-additions.css') }}">
</head>

<body>
<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  navbar();
  requireLogin();
</script>

<div class="container">
  <div id="message"></div>

  <form id="recommendationForm" class="card">
    <h1>AI Career Recommendation</h1>

    <p class="subtitle">
      Write your interests, skills, and the type of work you prefer. SQR AI will recommend the best specialization and related jobs.
    </p>

    <label class="required" for="interests">Your Interests</label>
    <textarea
      id="interests"
      name="interests"
      required
      placeholder="Example: I like cybersecurity, artificial intelligence, building apps, solving problems, working with data..."
    ></textarea>

    <label class="required" for="skills">Your Skills</label>
    <textarea
      id="skills"
      name="skills"
      required
      placeholder="Example: Python, Java, SQL, HTML, CSS, Linux, problem solving, teamwork..."
    ></textarea>

    <label class="required" for="preferred_work">Preferred Work Style</label>
    <textarea
      id="preferred_work"
      name="preferred_work"
      required
      placeholder="Write what kind of work you want. Example: I want to protect systems, analyze attacks, investigate security issues, and work in cybersecurity."
    ></textarea>

    <button type="submit">Get AI Recommendation</button>
  </form>

  <div id="recommendationResult" class="hidden"></div>
</div>

</body>
</html>
