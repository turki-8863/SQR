<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | AI Recommendation Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<script>navbar();</script>

<div class="container">
  <div id="message"></div>

  <section class="card">
    <h1>Career Recommendation Quiz</h1>
    <p class="subtitle">
      Answer the quiz and SQR will recommend the best computer science specialization for you.
    </p>

    <form id="quizForm">
      <div id="quizBox"></div>
      <button type="submit">Get Recommendation</button>
    </form>
  </section>

  <div id="result"></div>
</div>

<script>
requireLogin();

let quizQuestions = [];

async function loadQuiz() {
  quizBox.innerHTML = loadingHTML("Loading recommendation quiz...");

  const data = await apiGet("/api/recommendation/quiz");

  if (data.error) {
    quizBox.innerHTML = emptyState("Error", data.error);
    return;
  }

  quizQuestions = data.questions || [];

  quizBox.innerHTML = quizQuestions.map(q => `
    <div class="question-card">
      <h3>${escapeHTML(q.question)}</h3>
      ${(q.options || []).map(option => `
        <label class="option-row">
          <input type="radio" name="q${q.id}" value="${escapeHTML(option)}" required>
          <span>${escapeHTML(option)}</span>
        </label>
      `).join("")}
    </div>
  `).join("");
}

quizForm.addEventListener("submit", async e => {
  e.preventDefault();

  const answers = quizQuestions.map(q => {
    const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
    return {
      question: q.question,
      answer: selected ? selected.value : ""
    };
  });

  result.innerHTML = loadingHTML("AI is analyzing your quiz answers...");

  const data = await apiPost("/api/recommendation/submit", { answers });

  if (data.error) {
    result.innerHTML = emptyState("Error", data.error);
    return;
  }

  result.innerHTML = `
    <div class="result-box">
      <h2>Best Match</h2>
      <h3>${escapeHTML(data.best_match || "Recommended Specialization")}</h3>
      <p>${escapeHTML(data.summary || "")}</p>

      <h2>Recommended Specializations</h2>
      <div class="grid">
        ${(data.recommended_specializations || []).map(s => `
          <div class="recommend-card">
            <h3>${escapeHTML(s.name)}</h3>
            <p class="${matchColor(s.match_score || s.match_percentage)} recommend-score">
              ${safePercent(s.match_score || s.match_percentage)}%
            </p>
            <p>${escapeHTML(s.reason || "")}</p>

            <h4>Skills to Learn</h4>
            <p>${escapeHTML((s.skills_to_learn || []).join(", ") || "Not specified")}</p>

            <h4>Career Paths</h4>
            <p>${escapeHTML((s.career_paths || []).join(", ") || "Not specified")}</p>

            ${
              s.in_system && s.specialization_id
              ? `<a href="/specializations/${s.specialization_id}" class="btn-main">View Specialization</a>`
              : `<span class="badge">AI Suggested - Not in System</span>`
            }
          </div>
        `).join("") || emptyState("No recommendation", "Try answering more questions.")}
      </div>

      <h2>Roadmap</h2>
      <div class="roadmap-box">
        ${(data.roadmap || []).map(x => `<p>• ${escapeHTML(x)}</p>`).join("")}
      </div>
    </div>
  `;
});

loadQuiz();
</script>
</body>
</html>
