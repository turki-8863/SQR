<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SQR | Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>

  <style>
    .admin-layout{
      display:grid;
      grid-template-columns:260px 1fr;
      gap:24px;
      max-width:1500px;
      margin:30px auto;
      padding:0 20px;
    }

    .admin-sidebar{
      background:#111827;
      border-radius:22px;
      padding:22px;
      position:sticky;
      top:90px;
      height:fit-content;
    }

    .admin-sidebar h2{
      color:white;
      margin-bottom:18px;
    }

    .admin-menu{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .admin-menu button{
      border:0;
      border-radius:12px;
      padding:14px;
      cursor:pointer;
      font-weight:700;
      text-align:left;
      background:#1f2937;
      color:white;
      transition:.2s;
    }

    .admin-menu button:hover,
    .admin-menu button.active{
      background:#2563eb;
    }

    .admin-main{
      min-width:0;
    }

    .admin-section{
      display:none;
    }

    .admin-section.active{
      display:block;
    }

    .admin-form{
      display:grid;
      gap:12px;
      margin-bottom:24px;
    }

    .admin-list{
      display:grid;
      gap:16px;
    }

    .admin-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .admin-actions button{
      padding:10px 14px;
    }

    .stat-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:18px;
    }

    .stat-card{
      background:#111827;
      color:white;
      border-radius:18px;
      padding:20px;
    }

    .stat-card h3{
      margin:0 0 10px;
    }

    .stat-card p{
      margin:0;
      font-size:34px;
      font-weight:900;
    }
  </style>
</head>

<body>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    navbar();
    requireAdmin();
  });
</script>

<div class="admin-layout" id="adminBox">

  <aside class="admin-sidebar">
    <h2>SQR Admin</h2>

    <div class="admin-menu">
      <button data-section="dashboardSection" onclick="showAdminSection('dashboardSection')">Dashboard</button>

      <button data-section="specializationsSection" onclick="showAdminSection('specializationsSection')">
        Specializations
      </button>

      <button data-section="coursesSection" onclick="showAdminSection('coursesSection')">
        Courses
      </button>

      <button data-section="jobsSection" onclick="showAdminSection('jobsSection')">
        Jobs
      </button>

      <button data-section="quizzesSection" onclick="showAdminSection('quizzesSection')">
        Quizzes
      </button>

      <button data-section="certificatesSection" onclick="showAdminSection('certificatesSection')">
        Certificates
      </button>

      <button data-section="usersSection" onclick="showAdminSection('usersSection')">
        Users
      </button>
    </div>
  </aside>

  <main class="admin-main">

    <div id="message"></div>

    <!-- DASHBOARD -->

    <section id="dashboardSection" class="admin-section active">
      <h1>Dashboard</h1>
      <p class="subtitle">Website overview and statistics.</p>

      <div id="adminStatsBox"></div>
    </section>

    <!-- SPECIALIZATIONS -->

    <section id="specializationsSection" class="admin-section">

      <h1>Manage Specializations</h1>

      <form id="addSpecForm" class="card admin-form">

        <h2>Add Specialization</h2>

        <input
          type="text"
          name="name"
          placeholder="Specialization Name"
          required
        >

        <textarea
          name="description"
          placeholder="Description"
        ></textarea>

        <textarea
          name="skills"
          placeholder="Skills"
        ></textarea>

        <textarea
          name="roadmap"
          placeholder="Roadmap"
        ></textarea>

        <textarea
          name="job_titles"
          placeholder="Job Titles"
        ></textarea>

        <input
          type="text"
          name="image_url"
          placeholder="Image URL"
        >

        <button type="submit">Add Specialization</button>

      </form>

      <div id="adminSpecializationsList" class="admin-list"></div>

    </section>

    <!-- COURSES -->

    <section id="coursesSection" class="admin-section">

      <h1>Manage Courses</h1>

      <form id="addCourseForm" class="card admin-form">

        <h2>Add Course</h2>

        <select
          id="courseSpecialization"
          name="specialization_id"
          required
        ></select>

        <input
          type="text"
          id="courseTitle"
          name="title"
          placeholder="Course Title"
          required
        >

        <textarea
          id="courseDescription"
          name="description"
          placeholder="Description"
        ></textarea>

        <select
          id="courseDifficulty"
          name="level"
        >
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>

        <input
          type="text"
          id="courseLink"
          name="course_link"
          placeholder="Course Link"
        >

        <input
          type="text"
          name="video_url"
          placeholder="Video URL"
        >

        <input
          type="text"
          id="courseImage"
          name="image_url"
          placeholder="Image URL"
        >

        <button type="submit">Add Course</button>

      </form>

      <div id="adminCoursesList" class="admin-list"></div>

    </section>

    <!-- JOBS -->

    <section id="jobsSection" class="admin-section">

      <h1>Manage Jobs</h1>

      <form id="addJobForm" class="card admin-form">

        <h2>Add Job</h2>

        <select
          id="jobSpecialization"
          name="specialization_id"
          required
        ></select>

        <input
          type="text"
          id="jobTitle"
          name="title"
          placeholder="Job Title"
          required
        >

        <textarea
          id="jobDescription"
          name="description"
          placeholder="Description"
        ></textarea>

        <textarea
          id="jobSkills"
          name="required_skills"
          placeholder="Required Skills"
        ></textarea>

        <input
          type="text"
          id="jobSalary"
          name="average_salary"
          placeholder="Average Salary"
        >

        <input
          type="text"
          id="jobLink"
          name="job_link"
          placeholder="Job Link"
        >

        <button type="submit">Add Job</button>

      </form>

      <div id="adminJobsList" class="admin-list"></div>

    </section>

    <!-- QUIZZES -->

    <section id="quizzesSection" class="admin-section">

      <h1>Manage Quizzes</h1>

      <form id="addQuizForm" class="card admin-form">

        <h2>Add Quiz</h2>

        <select
          id="quizCourseSelect"
          name="course_id"
          required
        ></select>

        <input
          type="text"
          name="title"
          placeholder="Quiz Title"
          required
        >

        <textarea
          name="description"
          placeholder="Description"
        ></textarea>

        <input
          type="text"
          name="question_text"
          placeholder="Question"
        >

        <input
          type="text"
          name="option_a"
          placeholder="Option A"
        >

        <input
          type="text"
          name="option_b"
          placeholder="Option B"
        >

        <input
          type="text"
          name="option_c"
          placeholder="Option C"
        >

        <input
          type="text"
          name="option_d"
          placeholder="Option D"
        >

        <select name="correct_answer">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
        </select>

        <button type="submit">Add Quiz</button>

      </form>

      <div id="adminQuizzesList" class="admin-list"></div>

    </section>

    <!-- CERTIFICATES -->

    <section id="certificatesSection" class="admin-section">

      <h1>Manage Certificates</h1>

      <form id="addCertForm" class="card admin-form">

        <h2>Add Certificate</h2>

        <select
          id="certSpecialization"
          name="spec_id"
          required
        ></select>

        <input
          type="text"
          name="name"
          placeholder="Certificate Name"
          required
        >

        <textarea
          name="description"
          placeholder="Description"
        ></textarea>

        <input
          type="text"
          name="link"
          placeholder="Certificate Link"
        >

        <input
          type="text"
          name="price"
          placeholder="Price"
        >

        <select name="type">
          <option value="both">Both</option>
          <option value="practical">Practical</option>
          <option value="theoretical">Theoretical</option>
        </select>

        <button type="submit">Add Certificate</button>

      </form>

      <div id="adminCertificatesList" class="admin-list"></div>

    </section>

    <!-- USERS -->

    <section id="usersSection" class="admin-section">
      <h1>Manage Users</h1>
      <div id="usersBox"></div>
    </section>

  </main>

</div>

</body>
</html>
