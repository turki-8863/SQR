<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SQR Skill Quest Road dynamic CS career guidance platform.">
  <title>SQR | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body class="page-body admin-body">
  <main class="page-shell">
    <div id="message"></div>

    <section class="page-hero compact-hero gradient-blue">
      <div>
        <span class="eyebrow">Admin Dashboard</span>
        <h1>Manage SQR database content.</h1>
        <p>Add and update specializations, courses, quizzes, jobs, certificates, and users without hard-coded frontend data.</p>
      </div>
      <a href="profile.html" class="btn btn-light">Profile</a>
    </section>

    <section id="adminStatsBox" class="admin-stats-grid"></section>

    <section class="admin-layout">
      <aside class="admin-menu card">
        <button type="button" class="active" data-admin-tab="specializations">Specializations</button>
        <button type="button" data-admin-tab="courses">Courses</button>
        <button type="button" data-admin-tab="quizzes">Quizzes</button>
        <button type="button" data-admin-tab="jobs">Jobs</button>
        <button type="button" data-admin-tab="certificates">Certificates</button>
        <button type="button" data-admin-tab="users">Users</button>
      </aside>

      <div class="admin-content">
        <section class="admin-panel active" data-admin-panel="specializations">
          <form id="adminSpecializationForm" class="card form-card color-form" enctype="multipart/form-data">
            <h2>Add specialization</h2>
            <label class="required">Name</label><input name="name" required>
            <label>Description</label><textarea name="description"></textarea>
            <label>Skills</label><textarea name="skills"></textarea>
            <label>Roadmap</label><textarea name="roadmap"></textarea>
            <label>Image</label><input name="image" type="file" accept="image/*">
            <button type="submit" class="btn btn-primary">Save specialization</button>
          </form>
          <div id="adminSpecializationsList" class="admin-list"></div>
        </section>

        <section class="admin-panel" data-admin-panel="courses">
          <form id="adminCourseForm" class="card form-card color-form" enctype="multipart/form-data">
            <h2>Add course</h2>
            <label class="required">Specialization</label><select name="spec_id" id="adminCourseSpec" required></select>
            <label class="required">Title</label><input name="title" required>
            <label>Description</label><textarea name="description"></textarea>
            <label>Level</label><select name="level"><option>beginner</option><option>intermediate</option><option>advanced</option></select>
            <label>Course link</label><input name="link" placeholder="https://...">
            <label>Image</label><input name="image" type="file" accept="image/*">
            <label>Video</label><input name="video" type="file" accept="video/*">
            <button type="submit" class="btn btn-primary">Save course</button>
          </form>
          <div id="adminCoursesList" class="admin-list"></div>
        </section>

        <section class="admin-panel" data-admin-panel="quizzes">
          <form id="adminQuizForm" class="card form-card color-form">
            <h2>Add quiz with questions</h2>
            <label>Course</label><select name="course_id" id="adminQuizCourse"></select>
            <label class="required">Quiz title</label><input name="title" required>
            <label>Description</label><textarea name="description"></textarea>
            <label>Question</label><textarea name="question"></textarea>
            <label>Option 1</label><input name="option1">
            <label>Option 2</label><input name="option2">
            <label>Option 3</label><input name="option3">
            <label>Option 4</label><input name="option4">
            <label>Correct answer</label><input name="answer" placeholder="A, B, C, D or answer text">
            <button type="submit" class="btn btn-primary">Save quiz</button>
          </form>
          <div id="adminQuizzesList" class="admin-list"></div>
        </section>

        <section class="admin-panel" data-admin-panel="jobs">
          <form id="adminJobForm" class="card form-card color-form">
            <h2>Add job</h2>
            <label>Specialization</label><select name="specialization_id" id="adminJobSpec"></select>
            <label class="required">Title</label><input name="title" required>
            <label>Description</label><textarea name="description"></textarea>
            <label>Required skills</label><textarea name="skills"></textarea>
            <label>Salary</label><input name="salary">
            <label>Link</label><input name="link" placeholder="https://...">
            <button type="submit" class="btn btn-primary">Save job</button>
          </form>
          <div id="adminJobsList" class="admin-list"></div>
        </section>

        <section class="admin-panel" data-admin-panel="certificates">
          <form id="adminCertificateForm" class="card form-card color-form">
            <h2>Add certificate</h2>
            <label>Specialization</label><select name="specialization_id" id="adminCertSpec"></select>
            <label class="required">Name</label><input name="name" required>
            <label>Description</label><textarea name="description"></textarea>
            <label>Link</label><input name="link" placeholder="https://...">
            <button type="submit" class="btn btn-primary">Save certificate</button>
          </form>
          <div id="adminCertificatesList" class="admin-list"></div>
        </section>

        <section class="admin-panel" data-admin-panel="users">
          <div class="card colorful-card"><h2>Users</h2><p>Manage roles and banned status.</p></div>
          <div id="adminUsersList" class="admin-list"></div>
        </section>
      </div>
    </section>

  </main>
</body>
</html>
