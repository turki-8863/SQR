<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='sqr-fixes.css') }}">
</head>
<body>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  navbar();
  requireAdmin();
</script>

<div class="container">
  <div id="message"></div>

  <section class="hero">
    <h1>Admin Dashboard</h1>
    <p class="subtitle">
      Manage users, specializations, courses, quizzes, jobs, and certificates.
    </p>
  </section>

  <div id="adminBox">
    <div class="admin-layout">
      <aside class="admin-menu card">
        <button data-section="dashboardSection" onclick="showAdminSection('dashboardSection')">Dashboard</button>
        <button data-section="specializationsSection" onclick="showAdminSection('specializationsSection')">Specializations</button>
        <button data-section="coursesSection" onclick="showAdminSection('coursesSection')">Courses</button>
        <button data-section="quizzesSection" onclick="showAdminSection('quizzesSection')">Quizzes</button>
        <button data-section="jobsSection" onclick="showAdminSection('jobsSection')">Jobs</button>
        <button data-section="certificatesSection" onclick="showAdminSection('certificatesSection')">Certificates</button>
        <button data-section="usersSection" onclick="showAdminSection('usersSection')">Users</button>
      </aside>

      <main class="admin-content">
        <section id="dashboardSection" class="admin-section active">
          <h2>Website Statistics</h2>
          <div id="adminStatsBox"></div>
        </section>

        <section id="specializationsSection" class="admin-section">
          <form id="addSpecForm" class="card" enctype="multipart/form-data">
            <h2>Add Specialization</h2>

            <label>Name</label>
            <input name="name" required>

            <label>Description</label>
            <textarea name="description"></textarea>

            <label>Skills</label>
            <textarea name="skills"></textarea>

            <label>Roadmap</label>
            <textarea name="roadmap"></textarea>

            <label>Job Titles</label>
            <textarea name="job_titles"></textarea>

            <label>Image</label>
            <input type="file" name="image" accept="image/*">

            <button type="submit">Add Specialization</button>
          </form>

          <h2>Specializations List</h2>
          <div id="adminSpecializationsList"></div>
        </section>

        <section id="coursesSection" class="admin-section">
          <form id="addCourseForm" class="card" enctype="multipart/form-data">
            <h2>Add Course</h2>

            <label>Course Title</label>
            <input id="courseTitle" name="title" required>

            <label>Description</label>
            <textarea name="description"></textarea>

            <label>Search Specialization</label>
            <input id="courseSpecializationSearch" placeholder="Search specialization...">

            <label>Specialization</label>
            <select id="courseSpecialization" name="specialization_id" required></select>

            <label>Level</label>
            <select name="level">
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>

            <label>Course Link</label>
            <input id="courseLink" name="link" placeholder="https://...">

            <label>Course Image</label>
            <input type="file" name="image" accept="image/*">

            <label>Course Video</label>
            <input type="file" name="video" accept="video/*">

            <button type="submit">Add Course</button>
          </form>

          <h2>Courses List</h2>
          <div id="adminCoursesList"></div>
        </section>

        <section id="quizzesSection" class="admin-section">
          <form id="addQuizForm" class="card">
            <h2>Add Quiz</h2>

            <label>Quiz Title</label>
            <input name="title" required>

            <label>Search Course</label>
            <input id="quizCourseSearch" placeholder="Search course...">

            <label>Course</label>
            <select id="quizCourseSelect" name="course_id" required></select>

            <label>Question</label>
            <textarea name="question_text" required></textarea>

            <label>Option A</label>
            <input name="option_a" required>

            <label>Option B</label>
            <input name="option_b" required>

            <label>Option C</label>
            <input name="option_c" required>

            <label>Option D</label>
            <input name="option_d" required>

            <label>Correct Answer</label>
            <select name="correct_answer" required>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>

            <button type="submit">Add Quiz</button>
          </form>

          <h2>Quizzes List</h2>
          <div id="adminQuizzesList"></div>
        </section>

        <section id="jobsSection" class="admin-section">
          <form id="addJobForm" class="card">
            <h2>Add Job</h2>

            <label>Job Title</label>
            <input id="jobTitle" name="title" required>

            <label>Description</label>
            <textarea name="description"></textarea>

            <label>Search Specialization</label>
            <input id="jobSpecializationSearch" placeholder="Search specialization...">

            <label>Specialization</label>
            <select id="jobSpecialization" name="specialization_id" required></select>

            <label>Required Skills</label>
            <textarea id="jobSkills" name="required_skills"></textarea>

            <label>Average Salary</label>
            <input id="jobSalary" name="average_salary">

            <label>Job Link</label>
            <input id="jobLink" name="job_link" placeholder="https://...">

            <button type="submit">Add Job</button>
          </form>

          <h2>Jobs List</h2>
          <div id="adminJobsList"></div>
        </section>

        <section id="certificatesSection" class="admin-section">
          <form id="addCertForm" class="card">
            <h2>Add Certificate</h2>

            <label>Certificate Name</label>
            <input name="name" required>

            <label>Description</label>
            <textarea name="description"></textarea>

            <label>Search Specialization</label>
            <input id="certSpecializationSearch" placeholder="Search specialization...">

            <label>Specialization</label>
            <select id="certSpecialization" name="specialization_id"></select>

            <label>Price</label>
            <input name="price">

            <label>Type</label>
            <input name="type" placeholder="Practical, theoretical, or both">

            <label>Certificate Link</label>
            <input name="link" placeholder="https://...">

            <button type="submit">Add Certificate</button>
          </form>

          <h2>Certificates List</h2>
          <div id="adminCertificatesList"></div>
        </section>

        <section id="usersSection" class="admin-section">
          <h2>Users</h2>
          <div id="usersBox"></div>
        </section>
      </main>
    </div>
  </div>
</div>

</body>
</html>
