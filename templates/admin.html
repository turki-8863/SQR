<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles-additions.css') }}">
</head>
<body>
<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>navbar(); requireAdmin();</script>
<div class="container">
  <div id="message"></div>
  <div id="adminBox">
    <div class="page-header">
      <h1>Admin Dashboard</h1>
      <p class="subtitle">Fields marked with <span class="required-star">*</span> are required.</p>
    </div>
    <div class="grid admin-grid">
      <form id="addSpecForm" class="card" enctype="multipart/form-data">
        <h2>Add Specialization</h2>
        <label class="required" for="specName">Specialization Title</label>
        <input id="specName" name="name" required placeholder="Cybersecurity">
        <label class="required" for="specDesc">Description</label>
        <textarea id="specDesc" name="description" required placeholder="Describe the specialization"></textarea>
        <label class="required" for="specSkills">Skills</label>
        <textarea id="specSkills" name="skills" required placeholder="Linux, networking, Python..."></textarea>
        <label class="required" for="specRoadmap">Roadmap</label>
        <textarea id="specRoadmap" name="roadmap" required placeholder="Beginner steps, intermediate steps, advanced steps"></textarea>
        <label class="required" for="specJobs">Job Titles</label>
        <textarea id="specJobs" name="job_titles" required placeholder="SOC Analyst, Security Analyst..."></textarea>
        <label for="specPaths">Career Paths</label>
        <textarea id="specPaths" name="career_paths" placeholder="Optional extra paths"></textarea>
        <label for="specImage">Image</label>
        <input id="specImage" name="image" type="file" accept="image/*">
        <button type="submit">Add Specialization</button>
      </form>
      <form id="addCourseForm" class="card" enctype="multipart/form-data">
        <h2>Add Course</h2>
        <label class="required" for="courseSpecFilter">Specialization</label>
        <select id="courseSpecFilter" name="spec_id" required></select>
        <label class="required" for="courseTitle">Course Title</label>
        <input id="courseTitle" name="title" required placeholder="Intro to Cybersecurity">
        <label class="required" for="courseDesc">Course Description</label>
        <textarea id="courseDesc" name="description" required placeholder="What the user will learn"></textarea>
        <label for="courseLink">Actual Course Link</label>
        <input id="courseLink" name="link" placeholder="https://...">
        <label for="courseLevel">Level</label>
        <select id="courseLevel" name="level">
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
        <label for="courseImage">Course Image</label>
        <input id="courseImage" name="image" type="file" accept="image/*">
        <label for="courseVideo">Course Video</label>
        <input id="courseVideo" name="video" type="file" accept="video/*">
        <button type="submit">Add Course</button>
      </form>
      <form id="addQuizForm" class="card">
        <h2>Add Quiz Inside Course</h2>
        <label class="required" for="quizCourseFilter">Course</label>
        <select id="quizCourseFilter" name="course_id" required></select>
        <label class="required" for="quizTitle">Quiz Title</label>
        <input id="quizTitle" name="title" required placeholder="Module 1 Quiz">
        <label for="quizDescription">Quiz Description</label>
        <textarea id="quizDescription" name="description" placeholder="Optional quiz description"></textarea>
        <label class="required" for="questionText">Question</label>
        <textarea id="questionText" name="question_text" required placeholder="Write the question"></textarea>
        <label class="required" for="optionA">Option A</label>
        <input id="optionA" name="option_a" required>
        <label class="required" for="optionB">Option B</label>
        <input id="optionB" name="option_b" required>
        <label class="required" for="optionC">Option C</label>
        <input id="optionC" name="option_c" required>
        <label class="required" for="optionD">Option D</label>
        <input id="optionD" name="option_d" required>
        <label class="required" for="correctAnswer">Correct Answer</label>
        <input id="correctAnswer" name="correct_answer" required placeholder="Type the exact correct option text">
        <button type="submit">Add Quiz</button>
      </form>
      <form id="addCertForm" class="card">
        <h2>Add Certificate</h2>
        <label class="required" for="specSelect">Specialization</label>
        <select id="specSelect" name="spec_id" required></select>
        <label class="required" for="certName">Certificate Name</label>
        <input id="certName" name="name" required placeholder="Security+">
        <label for="certDesc">Description</label>
        <textarea id="certDesc" name="description" placeholder="Certificate description"></textarea>
        <label for="certLink">Official Link</label>
        <input id="certLink" name="link" placeholder="https://...">
        <label for="certPrice">Price</label>
        <input id="certPrice" name="price" placeholder="Example: 1500 SAR">
        <label for="certType">Type</label>
        <select id="certType" name="type">
          <option value="both">Both</option>
          <option value="practical">Practical</option>
          <option value="theoretical">Theoretical</option>
        </select>
        <button type="submit">Add Certificate</button>
      </form>
      <form id="addJobForm" class="card">
        <h2>Add Job</h2>
        <label class="required" for="jobTitle">Job Title</label>
        <input id="jobTitle" name="title" required placeholder="SOC Analyst">
        <label class="required" for="jobDescription">Description</label>
        <textarea id="jobDescription" name="description" required placeholder="Job description"></textarea>
        <label class="required" for="jobSkills">Required Skills</label>
        <textarea id="jobSkills" name="skills" required placeholder="SIEM, Linux, Networking"></textarea>
        <label for="jobSpecFilter">Specialization</label>
        <select id="jobSpecFilter" name="specialization"></select>
        <label for="jobSalary">Salary</label>
        <input id="jobSalary" name="salary" placeholder="Optional">
        <label for="jobLink">Apply Link</label>
        <input id="jobLink" name="link" placeholder="https://...">
        <button type="submit">Add Job</button>
      </form>
    </div>
    <h2>Manage Users</h2>
    <div id="usersBox" class="grid"></div>
  </div>
</div>
</body>
</html>
