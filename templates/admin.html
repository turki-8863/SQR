<!DOCTYPE html>
<html lang="en">
<head>
<title>SQR | Admin</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<div id="message"></div>
<section class="sqr-page-title"><h1>Admin Dashboard</h1><p>Admins manage the system. Admin mode is restricted to this page only.</p></section><main class="sqr-shell admin-layout"><aside class="admin-menu"><button data-section="dashboard" onclick="showAdminSection && showAdminSection('dashboard')">Dashboard</button><button data-section="specializations" onclick="showAdminSection && showAdminSection('specializations')">Specializations</button><button data-section="courses" onclick="showAdminSection && showAdminSection('courses')">Courses</button><button data-section="quizzes" onclick="showAdminSection && showAdminSection('quizzes')">Quizzes</button><button data-section="jobs" onclick="showAdminSection && showAdminSection('jobs')">Jobs</button><button data-section="certificates" onclick="showAdminSection && showAdminSection('certificates')">Certificates</button><button data-section="users" onclick="showAdminSection && showAdminSection('users')">Users</button></aside><section><div id="adminStats"></div><section id="dashboard" class="admin-section active"><h2>System numbers</h2><div id="adminStatsBox"></div></section><section id="specializations" class="admin-section"><h2>Add Specialization</h2><form id="adminSpecializationForm" class="admin-form-card" enctype="multipart/form-data"><div class="rec-field"><label>Name</label><input name="name" required></div><div class="rec-field"><label>Description</label><textarea name="description"></textarea></div><div class="rec-field"><label>Skills</label><textarea name="skills"></textarea></div><div class="rec-field"><label>Roadmap</label><textarea name="roadmap"></textarea></div><div class="rec-field"><label>Job titles</label><textarea name="job_titles"></textarea></div><div class="rec-field"><label>Image</label><input name="image" type="file" accept="image/*"></div><button class="btn btn-primary" type="submit">Add Specialization</button></form></section><section id="courses" class="admin-section"><h2>Add Course</h2><form id="adminCourseForm" class="admin-form-card" enctype="multipart/form-data"><div class="rec-field"><label>Specialization ID</label><input name="spec_id" required></div><div class="rec-field"><label>Title</label><input name="title" required></div><div class="rec-field"><label>Description</label><textarea name="description"></textarea></div><div class="rec-field"><label>Course link</label><input name="link"></div><div class="rec-field"><label>Level</label><select name="level"><option>beginner</option><option>intermediate</option><option>advanced</option></select></div><div class="rec-field"><label>Image</label><input name="image" type="file" accept="image/*"></div><div class="rec-field"><label>Video</label><input name="video" type="file" accept="video/*"></div><button class="btn btn-primary" type="submit">Add Course</button></form></section><section id="quizzes" class="admin-section"><h2>Add Quiz</h2><form id="adminQuizForm" class="admin-form-card"><div class="rec-field"><label>Course ID</label><input name="course_id"></div><div class="rec-field"><label>Specialization ID</label><input name="spec_id"></div><div class="rec-field"><label>Title</label><input name="title" required></div><div class="rec-field"><label>Description</label><textarea name="description"></textarea></div><div class="rec-field"><label>Questions JSON</label><textarea name="questions" rows="8" placeholder='[{"question":"...","option1":"A","option2":"B","option3":"C","option4":"D","answer":"A"}]'></textarea></div><button class="btn btn-primary" type="submit">Add Quiz</button></form></section><section id="jobs" class="admin-section"><h2>Add Job</h2><form id="adminJobForm" class="admin-form-card"><div class="rec-field"><label>Title</label><input name="title" required></div><div class="rec-field"><label>Specialization ID</label><input name="specialization_id"></div><div class="rec-field"><label>Description</label><textarea name="description"></textarea></div><div class="rec-field"><label>Skills</label><textarea name="skills"></textarea></div><div class="rec-field"><label>Salary</label><input name="salary"></div><div class="rec-field"><label>Link</label><input name="link"></div><button class="btn btn-primary" type="submit">Add Job</button></form></section><section id="certificates" class="admin-section"><h2>Add Certificate</h2><form id="adminCertificateForm" class="admin-form-card"><div class="rec-field"><label>Specialization ID</label><input name="spec_id" required></div><div class="rec-field"><label>Name</label><input name="name" required></div><div class="rec-field"><label>Description</label><textarea name="description"></textarea></div><div class="rec-field"><label>Link</label><input name="link"></div><div class="rec-field"><label>Price</label><input name="price"></div><button class="btn btn-primary" type="submit">Add Certificate</button></form></section><section id="users" class="admin-section"><h2>Users</h2><div id="adminUsers"></div></section></section></main><script>function showAdminSection(id){document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));document.getElementById(id)?.classList.add('active');}</script>
</body>
</html>
