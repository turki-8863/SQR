<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SQR Skill Quest Road dynamic CS career guidance platform.">
  <title>SQR | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body class="page-body admin-body colorful-page" data-page="admin">
  <main class="page-shell admin-shell">
    <div id="message" class="message-holder"></div>
    <section class="page-hero compact-hero gradient-admin"><div><span class="eyebrow">Admin Dashboard</span><h1>Manage the dynamic SQR website.</h1><p>Admins add content, upload media, manage users, and keep the student pages database-driven.</p></div><button type="button" class="btn btn-light" data-switch-mode="student">Switch to Student Mode</button></section>
    <section id="adminStatsBox" class="admin-stats grid cards-6"><article class="card skeleton-card"><div class="skeleton-line wide"></div></article></section>
    <section class="admin-layout section-block">
      <aside class="admin-menu color-card">
        <button type="button" class="active" data-admin-tab="specializations">Specializations</button>
        <button type="button" data-admin-tab="courses">Courses</button>
        <button type="button" data-admin-tab="quizzes">Quizzes</button>
        <button type="button" data-admin-tab="jobs">Jobs</button>
        <button type="button" data-admin-tab="certificates">Certificates</button>
        <button type="button" data-admin-tab="users">Users</button>
      </aside>
      <div class="admin-content">
        <section id="admin-specializations" class="admin-section active color-card">
          <h2>Add specialization</h2>
          <form id="adminSpecializationForm" class="stack-form" enctype="multipart/form-data">
            <label class="required">Name<input name="name" required placeholder="Cybersecurity"></label>
            <label>Description<textarea name="description" placeholder="Describe the path"></textarea></label>
            <label>Skills<textarea name="skills" placeholder="Linux, networks, security..."></textarea></label>
            <label>Roadmap<textarea name="roadmap" placeholder="Beginner steps, intermediate steps, advanced steps"></textarea></label>
            <label>Career paths<textarea name="career_paths" placeholder="SOC analyst, security engineer..."></textarea></label>
            <label>Image<input type="file" name="image" accept="image/*"></label>
            <button class="btn btn-primary" type="submit">Save Specialization</button>
          </form>
          <div id="adminSpecializationsList" class="admin-list"></div>
        </section>
        <section id="admin-courses" class="admin-section color-card">
          <h2>Add course</h2>
          <form id="adminCourseForm" class="stack-form" enctype="multipart/form-data">
            <label class="required">Course title<input name="title" required placeholder="Network Security Basics"></label>
            <label class="required">Specialization<select id="adminCourseSpecSelect" name="spec_id" required><option value="">Loading...</option></select></label>
            <label>Description<textarea name="description"></textarea></label>
            <label>Level<select name="level"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></label>
            <label>Course link<input name="link" placeholder="https://..."></label>
            <label>Image<input type="file" name="image" accept="image/*"></label>
            <label>Video<input type="file" name="video" accept="video/*"></label>
            <button class="btn btn-primary" type="submit">Save Course</button>
          </form>
          <div id="adminCoursesList" class="admin-list"></div>
        </section>
        <section id="admin-quizzes" class="admin-section color-card">
          <h2>Add quiz</h2>
          <form id="adminQuizForm" class="stack-form">
            <label class="required">Quiz title<input name="title" required placeholder="Module 1 Quiz"></label>
            <label>Course<select id="adminQuizCourseSelect" name="course_id"><option value="">Loading...</option></select></label>
            <label>Description<textarea name="description"></textarea></label>
            <label>Questions JSON<textarea name="questions_json" placeholder='[{"question":"...","option1":"...","option2":"...","option3":"...","option4":"...","answer":"option1"}]'></textarea></label>
            <button class="btn btn-primary" type="submit">Save Quiz</button>
          </form>
          <div id="adminQuizzesList" class="admin-list"></div>
        </section>
        <section id="admin-jobs" class="admin-section color-card">
          <h2>Add job</h2>
          <form id="adminJobForm" class="stack-form">
            <label class="required">Job title<input name="title" required placeholder="SOC Analyst"></label>
            <label>Specialization<select id="adminJobSpecSelect" name="specialization_id"><option value="">Loading...</option></select></label>
            <label>Description<textarea name="description"></textarea></label>
            <label>Required skills<textarea name="skills" placeholder="SIEM, Linux, Network Security"></textarea></label>
            <label>Average salary<input name="salary" placeholder="Optional"></label>
            <label>Job link<input name="link" placeholder="https://..."></label>
            <button class="btn btn-primary" type="submit">Save Job</button>
          </form>
          <div id="adminJobsList" class="admin-list"></div>
        </section>
        <section id="admin-certificates" class="admin-section color-card">
          <h2>Add certificate</h2>
          <form id="adminCertificateForm" class="stack-form">
            <label class="required">Name<input name="name" required placeholder="CompTIA Security+"></label>
            <label>Specialization<select id="adminCertificateSpecSelect" name="spec_id"><option value="">Loading...</option></select></label>
            <label>Description<textarea name="description"></textarea></label>
            <label>Link<input name="link" placeholder="https://..."></label>
            <label>Price<input name="price" placeholder="Optional"></label>
            <label>Type<select name="type"><option value="both">Both</option><option value="practical">Practical</option><option value="theoretical">Theoretical</option></select></label>
            <button class="btn btn-primary" type="submit">Save Certificate</button>
          </form>
          <div id="adminCertificatesList" class="admin-list"></div>
        </section>
        <section id="admin-users" class="admin-section color-card">
          <h2>Manage users</h2>
          <p>Only admins can promote, demote, ban, or unban users.</p>
          <div id="adminUsersList" class="admin-list"></div>
        </section>
      </div>
    </section>


    <section class="hidden-template-bank" hidden aria-hidden="true">
      <template data-template="database-card">
        <article class="card colorful-card dynamic-card clickable">
          <div class="card-media media-placeholder">
            <span>SQR</span>
          </div>
          <div class="card-content">
            <span class="badge">Dynamic</span>
            <h3 data-field="title"></h3>
            <p data-field="description"></p>
            <div class="details-actions">
              <a class="btn btn-secondary" data-field="link" href="#">Open</a>
            </div>
          </div>
        </article>
      </template>

      <template data-template="empty-state">
        <article class="card empty-state">
          <div class="empty-state-icon">◇</div>
          <h3 data-field="title">No data yet</h3>
          <p data-field="description">Admin content will appear here after it is added to the database.</p>
        </article>
      </template>

      <template data-template="loading-card">
        <article class="card skeleton-card">
          <div class="skeleton-media"></div>
          <div class="skeleton-line wide"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </article>
      </template>

      <template data-template="detail-view">
        <article class="card colorful-card detail-card">
          <div class="detail-media media-placeholder">
            <span>SQR</span>
          </div>
          <div class="detail-content">
            <span class="badge" data-field="type">Details</span>
            <h2 data-field="title"></h2>
            <p data-field="description"></p>
            <div class="detail-meta">
              <span data-field="meta_one"></span>
              <span data-field="meta_two"></span>
              <span data-field="meta_three"></span>
            </div>
          </div>
        </article>
      </template>

      <template data-template="progress-profile-only">
        <article class="profile-progress-item only-profile-progress">
          <div class="progress-head">
            <div>
              <h3 data-field="specialization"></h3>
              <p data-field="summary"></p>
            </div>
            <strong data-field="percentage">0%</strong>
          </div>
          <div class="progress">
            <div class="progress-fill" data-field="fill" style="width:0%"></div>
          </div>
          <div class="progress-meta">
            <span data-field="courses"></span>
            <span data-field="quizzes"></span>
          </div>
        </article>
      </template>

      <template data-template="admin-row">
        <article class="admin-row">
          <div>
            <strong data-field="title"></strong>
            <span data-field="subtitle"></span>
          </div>
          <div class="row-actions">
            <button type="button" class="btn btn-mini btn-secondary" data-action="edit">Edit</button>
            <button type="button" class="btn btn-mini btn-danger" data-action="delete">Delete</button>
          </div>
        </article>
      </template>

      <template data-template="circle-stat">
        <div class="score-circle" style="--score:0">
          <div class="score-circle-inner">
            <strong data-field="score">0%</strong>
            <span data-field="label">Score</span>
          </div>
        </div>
      </template>
    </section>

  </main>
</body>
</html>
