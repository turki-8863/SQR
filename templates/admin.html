<!DOCTYPE html>
<html lang="en">
<head>
  <title>SQR | Admin Dashboard</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body>
  <div class="sqr-page-title">
    <h1>Admin Dashboard</h1>
    <p>Manage users, specializations, courses, quizzes, jobs, and certificates. Admin accounts stay on this page only.</p>
  </div>

  <main id="adminDashboard" class="sqr-shell admin-main-grid">
    <div id="message"></div>

    <nav class="admin-tabs" aria-label="Admin sections">
      <button type="button" class="admin-tab-btn active" data-admin-tab="adminStatsSection">Dashboard</button>
      <button type="button" class="admin-tab-btn" data-admin-tab="specializationsAdminSection">Specializations</button>
      <button type="button" class="admin-tab-btn" data-admin-tab="coursesAdminSection">Courses</button>
      <button type="button" class="admin-tab-btn" data-admin-tab="quizzesAdminSection">Quizzes</button>
      <button type="button" class="admin-tab-btn" data-admin-tab="jobsAdminSection">Jobs</button>
      <button type="button" class="admin-tab-btn" data-admin-tab="certificatesAdminSection">Certificates</button>
      <button type="button" class="admin-tab-btn" data-admin-tab="usersAdminSection">Users</button>
    </nav>

    <section id="adminStatsSection" class="admin-section active admin-panel">
      <h2>Website Statistics</h2>
      <div id="adminStats" class="stats-grid"></div>
    </section>

    <section id="specializationsAdminSection" class="admin-section admin-panel">
      <h2>Add Specialization</h2>
      <form id="specializationForm" enctype="multipart/form-data">
        <label>Name <input name="name" required placeholder="Cybersecurity"></label>
        <label>Image <input name="image" type="file" accept="image/*"></label>
        <label>Description <textarea name="description" required></textarea></label>
        <label>Skills <textarea name="skills" placeholder="Linux, networks, security..."></textarea></label>
        <label>Roadmap <textarea name="roadmap" placeholder="Beginner topics, intermediate topics..."></textarea></label>
        <label>Job Titles <textarea name="job_titles" placeholder="SOC Analyst, Security Analyst..."></textarea></label>
        <button type="submit" class="btn btn-primary">Add Specialization</button>
      </form>
      <div id="adminSpecializationsList" class="grid cards-3"></div>
    </section>

    <section id="coursesAdminSection" class="admin-section admin-panel">
      <h2>Add Course</h2>
      <form id="courseForm" enctype="multipart/form-data">
        <label>Course Title <input name="title" required placeholder="Intro to Cybersecurity"></label>
        <label>Specialization <select name="spec_id" id="courseSpec" required></select></label>
        <label>Level <select name="level"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></label>
        <label>Course Link <input name="link" placeholder="https://..."></label>
        <label>Course Image <input name="image" type="file" accept="image/*"></label>
        <label>Course Video <input name="video" type="file" accept="video/*"></label>
        <label>Description <textarea name="description" required></textarea></label>
        <button type="submit" class="btn btn-primary">Add Course</button>
      </form>
      <div id="adminCoursesList" class="grid cards-3"></div>
    </section>

    <section id="quizzesAdminSection" class="admin-section admin-panel">
      <h2>Add Quiz</h2>
      <form id="quizForm">
        <label>Quiz Title <input name="title" required placeholder="Module 1 Quiz"></label>
        <label>Course <select name="course_id" id="quizCourse" required></select></label>
        <label>Description <textarea name="description"></textarea></label>
        <div id="questionsBox" class="questions-box"></div>
        <button type="button" id="addQuestionBtn" class="btn btn-soft">Add Question</button>
        <button type="submit" class="btn btn-primary">Add Quiz</button>
      </form>
    </section>

    <section id="jobsAdminSection" class="admin-section admin-panel">
      <h2>Add Job</h2>
      <form id="jobForm">
        <label>Job Title <input name="title" required placeholder="SOC Analyst"></label>
        <label>Specialization <select name="spec_id" id="jobSpec" required></select></label>
        <label>Average Salary <input name="salary" placeholder="8,000 - 12,000 SAR"></label>
        <label>Job Link <input name="link" placeholder="https://..."></label>
        <label>Description <textarea name="description" required></textarea></label>
        <label>Required Skills <textarea name="skills" placeholder="SIEM, Linux, networking..."></textarea></label>
        <button type="submit" class="btn btn-primary">Add Job</button>
      </form>
    </section>

    <section id="certificatesAdminSection" class="admin-section admin-panel">
      <h2>Add Certificate</h2>
      <form id="certificateForm">
        <label>Certificate Name <input name="name" required placeholder="CompTIA Security+"></label>
        <label>Specialization <select name="spec_id" id="certSpec" required></select></label>
        <label>Price <input name="price" placeholder="Free / Paid / 1200 SAR"></label>
        <label>Type <select name="type"><option value="both">Both</option><option value="practical">Practical</option><option value="theoretical">Theoretical</option></select></label>
        <label>Certificate Link <input name="link" placeholder="https://..."></label>
        <label>Description <textarea name="description"></textarea></label>
        <button type="submit" class="btn btn-primary">Add Certificate</button>
      </form>
    </section>

    <section id="usersAdminSection" class="admin-section admin-panel">
      <h2>Users</h2>
      <div id="usersBox"></div>
    </section>
  </main>
</body>
</html>
