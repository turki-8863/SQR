<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Specializations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<script>navbar();</script>
<section class="hero"><h1>Specializations</h1><p>Choose a specialization after viewing its description, roadmap, certificates, jobs, and courses.</p></section>
<div class="container">
  <div id="message"></div>
  <div id="specGrid" class="grid"></div>
  <div id="specDetails"></div>
</div>
<script>
async function loadSpecializations(){
  specGrid.innerHTML = loadingHTML("Loading specializations...");
  const specs = await apiGet("/api/specializations");
  if(!Array.isArray(specs) || !specs.length){ specGrid.innerHTML = emptyState("No specializations","Admin has not added specializations yet."); return; }
  specGrid.innerHTML = specs.map(spec => `
    <div class="card spec-card" onclick="viewSpec(${spec.id})">
      ${spec.image_url ? `<img src="${imageUrl(spec.image_url)}" alt="${escapeHTML(spec.name)}">` : ""}
      <h3>${escapeHTML(spec.name)}</h3>
      <p>${escapeHTML(spec.description || "No description yet.")}</p>
      ${keywordTags(spec.skills || spec.job_titles || spec.career_paths)}
      <div class="card-actions"><button onclick="event.stopPropagation();viewSpec(${spec.id})">View Details</button></div>
    </div>`).join("");
}
async function viewSpec(id){
  specDetails.innerHTML = loadingHTML("Loading details...");
  const spec = await apiGet("/api/specializations/" + id);
  if(spec.error){ specDetails.innerHTML = emptyState("Error", spec.error); return; }
  specDetails.innerHTML = `
    <div class="detail-box">
      <div class="detail-header">
        <div><h2>${escapeHTML(spec.name)}</h2><p>${escapeHTML(spec.description || "")}</p></div>
        <button onclick="enrollSpec(${spec.id})">Enroll in Specialization</button>
      </div>
      ${spec.image_url ? `<img class="detail-image" src="${imageUrl(spec.image_url)}" alt="${escapeHTML(spec.name)}">` : ""}
      <div class="detail-section"><h3>Roadmap</h3><div class="roadmap-box">${escapeHTML(spec.roadmap || "No roadmap added yet.")}</div></div>
      <div class="detail-section"><h3>Job Titles</h3><div class="job-title-list">${formatList(spec.job_titles || spec.career_paths).map(j=>`<span>${escapeHTML(j)}</span>`).join("") || "<p>No job titles added yet.</p>"}</div></div>
      <div class="detail-section"><h3>Certifications</h3><div class="grid">${(spec.certificates || []).map(c=>`
        <div class="card"><h3>${escapeHTML(c.name)}</h3><p>${escapeHTML(c.description || "")}</p><p><b>Price:</b> ${escapeHTML(c.price || "N/A")}</p><p><b>Type:</b> ${escapeHTML(c.type || "Both")}</p>${c.link ? `<a class="btn-light" target="_blank" href="${escapeHTML(c.link)}">Official Link</a>` : ""}</div>`).join("") || "<p>No certificates added yet.</p>"}</div></div>
      <div class="detail-section"><h3>Courses</h3><div class="grid">${(spec.courses || []).map(course=>`
        <div class="card course-card"><h3>${escapeHTML(course.title)}</h3><span class="level-badge ${levelClass(course.level)}">${levelLabel(course.level)}</span><p>${escapeHTML(course.description || "")}</p><a class="btn-main" href="/courses?spec_id=${spec.id}">View Courses</a></div>`).join("") || "<p>No courses added yet.</p>"}</div></div>
    </div>`;
  specDetails.scrollIntoView({behavior:"smooth"});
}
async function enrollSpec(id){
  requireLogin();
  const data = await apiPost("/api/specializations/" + id + "/enroll", {});
  if(data.error) showMessage("message", data.error, "error"); else showMessage("message", data.message || "Enrolled successfully");
}
loadSpecializations();
</script>
</body>
</html>
