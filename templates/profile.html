<!DOCTYPE html>
<html lang="en">
<head>
<title>SQR | Profile</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<div id="message"></div>
<section class="sqr-page-title"><h1>Profile Dashboard</h1><p>Track specialization progress, opened courses, quizzes, and profile preferences.</p></section><main class="sqr-shell"><section id="profileBox"></section><section id="progressBox"></section><form id="profileForm" class="rec-card"><h2>Update Profile</h2><div class="rec-field"><label for="name">Name</label><input id="name" name="name"></div><div class="rec-field"><label for="skills">Skills</label><textarea id="skills" name="skills" rows="3"></textarea></div><div class="rec-field"><label for="interests">Interests</label><textarea id="interests" name="interests" rows="3"></textarea></div><div class="rec-field"><label for="goal">Goal</label><textarea id="goal" name="goal" rows="3"></textarea></div><button class="btn btn-primary" type="submit">Save Profile</button></form></main>
</body>
</html>
