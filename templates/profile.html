<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='sqr-fixes.css') }}">
</head>
<body>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  navbar();
  requireLogin();
</script>

<div class="container">
  <div id="message"></div>

  <section class="hero">
    <h1>Profile</h1>
    <p class="subtitle">
      Manage your information and track your specialization progress.
    </p>
  </section>

  <div id="profileBox"></div>

  <form id="profileForm" class="card">
    <h2>Update Profile</h2>

    <label for="name">Name</label>
    <input id="name" name="name" placeholder="Your name">

    <label for="skills">Skills</label>
    <textarea id="skills" name="skills" placeholder="Python, SQL, Cybersecurity, AI..."></textarea>

    <label for="interests">Interests</label>
    <textarea id="interests" name="interests" placeholder="AI, data, cloud, security..."></textarea>

    <label for="goal">Goal</label>
    <textarea id="goal" name="goal" placeholder="I want to become a cybersecurity analyst..."></textarea>

    <button type="submit">Save Profile</button>
  </form>

  <section class="section">
    <h2>Progress</h2>
    <div id="progressBox"></div>
  </section>
</div>

</body>
</html>
