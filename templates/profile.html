<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQR | Profile</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
  <div id="message"></div>
  <main class="container">
    <section id="profileBox"></section>
    <form id="profileForm" class="card mt-3">
      <h2>Update Profile</h2>
      <div class="form-grid">
        <div><label for="name">Name</label><input id="name" name="name"></div>
        <div><label for="email">Email</label><input id="email" name="email" type="email"></div>
        <div class="full"><label for="skills">Skills</label><textarea id="skills" name="skills"></textarea></div>
        <div class="full"><label for="interests">Interests</label><textarea id="interests" name="interests"></textarea></div>
        <div class="full"><label for="goal">Goal</label><textarea id="goal" name="goal"></textarea></div>
      </div>
      <div class="card-actions">
        <button type="submit" class="btn btn-primary">Save Profile</button>
        <button type="button" id="modeSwitch" class="btn btn-soft">Switch Mode</button>
      </div>
    </form>
  </main>
</body>
</html>
