<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | ATS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  navbar();
  requireLogin();
</script>

<div class="container">
  <div id="message"></div>

  <form id="atsGenerateForm">
    <h1>ATS Resume Generator</h1>

    <div class="form-grid">
      <input name="name" id="name" placeholder="Full name">
      <input name="email" id="email" placeholder="Email">
      <input name="phone" id="phone" placeholder="Phone">
      <input name="linkedin" id="linkedin" placeholder="LinkedIn">
      <input name="portfolio" id="portfolio" placeholder="Portfolio">
      <input name="target_job" id="target_job" placeholder="Target job">
    </div>

    <textarea name="summary" id="summary" placeholder="Summary"></textarea>
    <textarea name="skills" id="skills" placeholder="Technical skills"></textarea>
    <textarea name="soft_skills" id="soft_skills" placeholder="Soft skills"></textarea>
    <textarea name="languages" id="languages" placeholder="Languages"></textarea>
    <textarea name="experience" id="experience" placeholder="Experience"></textarea>
    <textarea name="projects" id="projects" placeholder="Projects"></textarea>
    <textarea name="education" id="education" placeholder="Education"></textarea>
    <textarea name="certifications" id="certifications" placeholder="Certifications"></textarea>

    <button type="submit">Generate Resume</button>
  </form>

  <div id="generatedResume"></div>

  <form id="atsCheckForm">
    <h2>ATS Checker</h2>

    <textarea name="resume_text" id="resume_text" placeholder="Paste resume text"></textarea>
    <textarea name="job_description" id="job_description" placeholder="Paste job description"></textarea>

    <button type="submit">Check ATS Score</button>
  </form>

  <div id="atsResult"></div>
</div>

</body>
</html>
