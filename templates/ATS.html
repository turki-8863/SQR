<!DOCTYPE html>
<html lang="en">
<head>
<title>SQR | ATS</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<div id="message"></div>
<section class="sqr-page-title"><h1>ATS Resume Tools</h1><p>Upload PDF/DOCX/TXT for checking, or generate an ATS-friendly resume.</p></section><main class="sqr-shell"><section class="rec-layout"><form id="atsCheckForm" class="rec-card" enctype="multipart/form-data"><h2>ATS Checker</h2><div class="rec-field"><label for="resume_file">Resume file</label><input id="resume_file" name="resume_file" type="file" accept=".pdf,.docx,.txt" required></div><div class="rec-field"><label for="job_description">Job description</label><textarea id="job_description" name="job_description" rows="6"></textarea></div><button class="btn btn-primary" type="submit">Check Resume</button></form><form id="atsGenerateForm" class="rec-card"><h2>ATS Generator</h2><div class="rec-field"><label for="name">Full name</label><input id="name" name="name" required></div><div class="rec-field"><label for="target_job">Target job</label><input id="target_job" name="target_job" required></div><div class="rec-field"><label for="email">Email</label><input id="email" name="email"></div><div class="rec-field"><label for="phone">Phone</label><input id="phone" name="phone"></div><div class="rec-field"><label for="summary">Summary</label><textarea id="summary" name="summary" rows="3"></textarea></div><div class="rec-field"><label for="skills">Skills</label><textarea id="skills" name="skills" rows="3" required></textarea></div><div class="rec-field"><label for="education">Education</label><textarea id="education" name="education" rows="3"></textarea></div><div class="rec-field"><label for="experience">Experience</label><textarea id="experience" name="experience" rows="3"></textarea></div><div class="rec-field"><label for="projects">Projects</label><textarea id="projects" name="projects" rows="3"></textarea></div><button class="btn btn-primary" type="submit">Generate Resume</button></form></section><section id="atsResult"></section><section id="atsGenerateResult"></section></main>
</body>
</html>
