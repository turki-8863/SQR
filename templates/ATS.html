<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | ATS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='sqr-fixes.css') }}">

  <style>
    .required-star {
      color: #ef4444;
      font-weight: 900;
      margin-left: 4px;
    }

    .required-label::after {
      content: " *";
      color: #ef4444;
      font-weight: 900;
    }
  </style>
</head>
<body>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  navbar();
  requireLogin();
</script>

<div class="container">
  <div id="message"></div>

  <section class="hero">
    <h1>ATS Resume Tools</h1>
    <p class="subtitle">
      Check your resume or generate an ATS-friendly resume. Results are private for each user.
    </p>
  </section>

  <div class="grid two">

    <form id="atsCheckForm" class="card" enctype="multipart/form-data">
      <h2>ATS Resume Checker</h2>
      <p class="subtitle">
        Upload only PDF or DOCX files.
      </p>

      <label for="target_job_check" class="required-label">Target Job / Job Description</label>
      <textarea
        id="target_job_check"
        name="target_job"
        required
        placeholder="Paste the job title or job description here..."
      ></textarea>

      <label for="resume" class="required-label">Upload Resume</label>
      <input
        id="resume"
        name="resume"
        type="file"
        accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        required
      >

      <button type="submit">Check Resume</button>
    </form>

    <form id="atsGenerateForm" class="card">
      <h2>ATS Resume Generator</h2>
      <p class="subtitle">
        Fields marked with <span class="required-star">*</span> are required.
      </p>

      <label for="full_name" class="required-label">Full Name</label>
      <input
        id="full_name"
        name="name"
        required
        placeholder="Your full name"
      >

      <label for="email" class="required-label">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        required
        placeholder="you@example.com"
      >

      <label for="phone" class="required-label">Phone</label>
      <input
        id="phone"
        name="phone"
        required
        placeholder="+966..."
      >

      <label for="target_job" class="required-label">Target Job</label>
      <input
        id="target_job"
        name="target_job"
        required
        placeholder="Cybersecurity Analyst"
      >

      <label for="summary" class="required-label">Professional Summary</label>
      <textarea
        id="summary"
        name="summary"
        required
        placeholder="Write a short summary about yourself, your skills, and your career goal..."
      ></textarea>

      <label for="skills" class="required-label">Skills</label>
      <textarea
        id="skills"
        name="skills"
        required
        placeholder="Python, SQL, Linux, AWS, JavaScript..."
      ></textarea>

      <label for="education" class="required-label">Education</label>
      <textarea
        id="education"
        name="education"
        required
        placeholder="Your college, major, graduation year..."
      ></textarea>

      <label for="projects" class="required-label">Projects</label>
      <textarea
        id="projects"
        name="projects"
        required
        placeholder="Describe your projects..."
      ></textarea>

      <label for="certifications">Certifications</label>
      <textarea
        id="certifications"
        name="certifications"
        placeholder="Write your certifications if you have any..."
      ></textarea>

      <label for="experience">Experience</label>
      <textarea
        id="experience"
        name="experience"
        placeholder="Write your experience if you have any..."
      ></textarea>

      <label for="work_style" class="required-label">Work Style / AI Instructions</label>
      <textarea
        id="work_style"
        name="work_style"
        required
        placeholder="Write how you want the AI to adapt your resume. Example: make it simple, professional, cybersecurity-focused..."
      ></textarea>

      <button type="submit">Generate Resume</button>
    </form>

  </div>

  <div id="atsCheckResult"></div>
  <div id="generatedResume"></div>
  <div id="atsResult"></div>
</div>

</body>
</html>
