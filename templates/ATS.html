<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | ATS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='sqr-fixes.css') }}">
</head>
<body>

<script src="{{ url_for('static', filename='app.js') }}"></script>
<script>
  navbar();
  requireLogin();
</script>

<div class="container">
  <div id="message"></div>

  <section class="hero">
    <h1>ATS Resume Tools</h1>
    <p class="subtitle">
      Check your resume or generate an ATS-friendly resume. Results are not shared between users.
    </p>
  </section>

  <div class="grid two">
    <form id="atsCheckForm" class="card" enctype="multipart/form-data">
      <h2>ATS Resume Checker</h2>

      <label for="target_job_check">Target Job / Job Description</label>
      <textarea id="target_job_check" name="target_job" required placeholder="Paste the job title or job description here..."></textarea>

      <label for="resume">Upload Resume</label>
      <input id="resume" name="resume" type="file" accept=".pdf,.docx,.txt" required>

      <button type="submit">Check Resume</button>
    </form>

    <form id="atsGenerateForm" class="card">
      <h2>ATS Resume Generator</h2>

      <label for="full_name">Full Name</label>
      <input id="full_name" name="name" required placeholder="Your full name">

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required placeholder="you@example.com">

      <label for="phone">Phone</label>
      <input id="phone" name="phone" placeholder="+966...">

      <label for="target_job">Target Job</label>
      <input id="target_job" name="target_job" required placeholder="Cybersecurity Analyst">

      <label for="skills">Skills</label>
      <textarea id="skills" name="skills" required placeholder="Python, SQL, Linux, AWS..."></textarea>

      <label for="education">Education</label>
      <textarea id="education" name="education" placeholder="Your university, major, GPA if you want..."></textarea>

      <label for="projects">Projects</label>
      <textarea id="projects" name="projects" placeholder="Describe your projects..."></textarea>

      <label for="certifications">Certifications</label>
      <textarea id="certifications" name="certifications" placeholder="Write your certifications..."></textarea>

      <label for="work_style">Work Style / AI Instructions</label>
      <textarea id="work_style" name="work_style" placeholder="Write how you want the AI to adapt your resume..."></textarea>

      <button type="submit">Generate Resume</button>
    </form>
  </div>

  <div id="atsCheckResult"></div>
  <div id="generatedResume"></div>
  <div id="atsResult"></div>
</div>

</body>
</html>
