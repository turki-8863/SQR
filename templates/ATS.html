<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SQR | ATS Resume Tools</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body data-protected="student" class="ats-page">

<div class="container ats-container">
  <div id="message"></div>

  <section class="section-heading">
    <span>ATS Tools</span>
    <h1>ATS Resume Checker & Generator</h1>
    
  </section>

  <div class="ats-layout">

    <form id="atsCheckForm" class="card dark-card ats-card" enctype="multipart/form-data">
      <div class="form-title">
        <h2>ATS Resume Checker</h2>
        <p>Upload only PDF or DOCX files.</p>
      </div>

      <div class="form-grid one-column">
        <div>
          <label class="required" for="resume_file">Resume File</label>
          <input
            type="file"
            name="resume_file"
            id="resume_file"
            accept=".pdf,.docx"
            required
          >
        </div>

        <div>
          <label for="target_job">Target Job</label>
          <input
            type="text"
            name="target_job"
            id="target_job"
            placeholder="Software Engineer, Cybersecurity Analyst, Data Analyst..."
          >
        </div>

        <div>
          <label for="job_description">Job Description</label>
          <textarea
            name="job_description"
            id="job_description"
            placeholder="Paste the job description here to compare your resume with the job requirements..."
          ></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary full-btn">Check Resume</button>
    </form>

    <form id="atsGenerateForm" class="card dark-card ats-card">
      <div class="form-title">
        <h2>ATS Resume Generator</h2>
        <p>Fields marked with <span class="required-star">*</span> are required.</p>
      </div>

      <div class="form-grid">
        <div>
          <label class="required" for="name">Full Name</label>
          <input
            name="name"
            id="name"
            required
            placeholder="Your full name"
          >
        </div>

        <div>
          <label class="required" for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            required
            placeholder="example@email.com"
          >
        </div>

        <div>
          <label class="required" for="phone">Phone</label>
          <input
            name="phone"
            id="phone"
            required
            placeholder="+966..."
          >
        </div>

        <div>
          <label for="location">Location</label>
          <input
            name="location"
            id="location"
            placeholder="Dammam, Saudi Arabia"
          >
        </div>

        <div>
          <label class="required" for="target_role">Target Role</label>
          <input
            name="target_role"
            id="target_role"
            required
            placeholder="Software Engineer, SOC Analyst..."
          >
        </div>

        <div>
          <label for="linkedin">LinkedIn / Portfolio</label>
          <input
            name="linkedin"
            id="linkedin"
            placeholder="LinkedIn, GitHub, portfolio link..."
          >
        </div>
      </div>

      <div class="form-grid one-column">
        <div>
          <label class="required" for="summary">Professional Summary</label>
          <textarea
            name="summary"
            id="atsSummaryResult"
            required
            placeholder="Write a short summary about your background, goals, and strengths..."
          ></textarea>
        </div>

        <div>
          <label class="required" for="technical_skills">Technical Skills</label>
          <textarea
            name="technical_skills"
            id="technical_skills"
            required
            placeholder="Python, SQL, Java, Linux, Flask, HTML, CSS, Git, APIs..."
          ></textarea>
        </div>

        <div>
          <label class="required" for="soft_skills">Soft Skills</label>
          <textarea
            name="soft_skills"
            id="soft_skills"
            required
            placeholder="Communication, teamwork, problem solving, leadership, time management..."
          ></textarea>
        </div>

        <div>
          <label class="required" for="education">Education</label>
          <textarea
            name="education"
            id="education"
            required
            placeholder="College, major, GPA if you want, graduation year..."
          ></textarea>
        </div>

        <div>
          <label for="experience">Experience</label>
          <textarea
            name="experience"
            id="experience"
            placeholder="Internships, training, work experience, responsibilities, achievements..."
          ></textarea>
        </div>

        <div>
          <label for="projects">Projects</label>
          <textarea
            name="projects"
            id="projects"
            placeholder="Project name, tools used, what you built, result..."
          ></textarea>
        </div>

        <div>
          <label for="certifications">Certifications</label>
          <textarea
            name="certifications"
            id="certifications"
            placeholder="Cisco, AWS, Google, CompTIA, Coursera, Udemy..."
          ></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary full-btn">Generate ATS Resume</button>
    </form>

  </div>

  <section id="atsResult" class="hidden result-area"></section>

  <section id="generatedResume" class="hidden result-area"></section>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
