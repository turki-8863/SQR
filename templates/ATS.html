<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQR | ATS Tools</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
  <div id="message"></div>
  <main class="container">
    <section class="page-hero">
      <span class="eyebrow">Resume AI</span>
      <h1>ATS Resume Tools</h1>
      <p>Check your resume or generate an ATS-friendly resume. Checker accepts PDF or DOCX uploads only.</p>
    </section>
    <section class="grid cards-2">
      <form id="atsCheckForm" class="card" enctype="multipart/form-data">
        <h2>ATS Resume Checker</h2>
        <p>Upload only PDF or DOCX files.</p>
        <label for="target_job">Target Job / Job Description</label>
        <textarea id="target_job" name="target_job" placeholder="Paste the job title or description..."></textarea>
        <label class="required" for="resume">Upload Resume</label>
        <input id="resume" name="resume" type="file" accept=".pdf,.docx" required>
        <button type="submit" class="btn btn-primary">Check Resume</button>
      </form>
      <form id="atsGenerateForm" class="card">
        <h2>ATS Resume Generator</h2>
        <p>Fields marked with <span class="required-star">*</span> are required.</p>
        <div class="form-grid">
          <div><label class="required" for="name">Full Name</label><input id="name" name="name" required></div>
          <div><label class="required" for="email">Email</label><input id="email" name="email" type="email" required></div>
          <div><label for="phone">Phone</label><input id="phone" name="phone"></div>
          <div><label class="required" for="target_job_gen">Target Job</label><input id="target_job_gen" name="target_job" required></div>
          <div class="full"><label class="required" for="summary">Professional Summary</label><textarea id="summary" name="summary" required></textarea></div>
          <div class="full"><label class="required" for="skills_gen">Skills</label><textarea id="skills_gen" name="skills" required></textarea></div>
          <div class="full"><label for="education">Education</label><textarea id="education" name="education"></textarea></div>
          <div class="full"><label for="projects">Projects</label><textarea id="projects" name="projects"></textarea></div>
          <div class="full"><label for="certifications">Certifications</label><textarea id="certifications" name="certifications"></textarea></div>
          <div class="full"><label for="experience">Experience</label><textarea id="experience" name="experience"></textarea></div>
          <div class="full"><label for="work_style">Work Style / AI Instructions</label><textarea id="work_style" name="work_style" placeholder="Write how you want the AI to adapt the resume..."></textarea></div>
        </div>
        <button type="submit" class="btn btn-primary">Generate Resume</button>
      </form>
    </section>
    <section id="atsCheckResult" class="mt-3"></section>
    <section id="atsGenerateResult" class="mt-3"></section>
  </main>
</body>
</html>
