<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SQR Skill Quest Road dynamic CS career guidance platform.">
  <title>SQR | Quizzes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body class="page-body quiz-body">
  <main class="page-shell">
    <div id="message"></div>

    <section class="page-hero compact-hero gradient-blue">
      <div>
        <span class="eyebrow">Quizzes</span>
        <h1>Take course-linked quizzes and save real scores.</h1>
        <p>Quiz results update the profile dashboard and specialization progress.</p>
      </div>
      <a href="profile.html" class="btn btn-light">Open profile</a>
    </section>
    <section id="quizDetails" class="detail-zone"></section>
    <section class="section-block color-panel cyan-panel">
      <div class="section-heading left-heading">
        <span>Available quizzes</span>
        <h2>Quiz catalog</h2>
        <p>The admin controls quizzes and questions from the admin page.</p>
      </div>
      <div id="quizzesBox" class="grid cards-3 dynamic-grid"></div>
    </section>

  </main>
</body>
</html>
